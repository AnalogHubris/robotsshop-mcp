# Target: hermes-agent/optional-mcps/robotsshop/manifest.yaml
# Merged via PR review = Nous catalog approval.
manifest_version: 1

name: robotsshop
description: >-
  RobotsShop Trust Index — x402 settlement truth for agents (free payTo
  mismatches, free→paid onramp, free trips). stdio FastMCP; no API key required
  for free tools.

source: https://github.com/AnalogHubris/robotsshop-mcp

transport:
  type: stdio
  command: "${INSTALL_DIR}/.venv/bin/python"
  args:
    - "${INSTALL_DIR}/trust_index_mcp.py"
  env:
    TRUST_INDEX_API: "https://api.robotsshop.io"

install:
  type: git
  url: https://github.com/AnalogHubris/robotsshop-mcp.git
  ref: 06fd3da3564f57930b1c4b1d2eab07c4867d07b1
  bootstrap:
    - "python3 -m venv .venv"
    - ".venv/bin/pip install -r requirements.txt"

auth:
  type: none

tools:
  default_enabled:
    - onramp
    - mismatches
    - stats
    - leaderboard
    - lookup
    - free_trips
    - paid_routes_help

post_install: |
  RobotsShop Trust Index uses public API https://api.robotsshop.io by default.
  Free tools never attach payment. Paid depth is HTTP x402 (Base USDC).

  Habit: onramp → mismatches → lookup before spending USDC.

  Site: https://robotsshop.io
  Repo: https://github.com/AnalogHubris/robotsshop-mcp
  Contact: hello@robotsshop.io

  Start a new Hermes session (or /reload-mcp) to load tools.
